# =============================================================================
# ANSIBLE INVENTORY - MINI SOC ROCKY LINUX
# =============================================================================
# Chemin: inventory.ini
# Usage: ansible-playbook -i inventory.ini playbook_xxx.yml
# =============================================================================

[all:vars]
# Variables globales
ansible_user=admin-soc
ansible_become=yes
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3

# =============================================================================
# GROUPES PAR RÔLE
# =============================================================================

[web_servers]
# Serveurs web exposés (VM1)
web-01 ansible_host=192.168.100.10

[soc_servers]
# Serveurs SOC/SIEM/Logs (VM2)
soc-01 ansible_host=192.168.100.20

[monitoring_servers]
# Serveurs monitoring (VM3)
monitoring-01 ansible_host=192.168.100.30

# =============================================================================
# GROUPES PAR FONCTION
# =============================================================================

[hardening:children]
# Tous les serveurs nécessitant hardening
web_servers
soc_servers
monitoring_servers

[monitoring:children]
# Serveur de monitoring
monitoring_servers

[monitored:children]
# Serveurs monitorés
web_servers
soc_servers

# =============================================================================
# VARIABLES PAR GROUPE
# =============================================================================

[web_servers:vars]
server_role=web
firewall_http=true
firewall_https=true

[soc_servers:vars]
server_role=soc
wazuh_manager=true
elasticsearch=true

[monitoring_servers:vars]
server_role=monitoring
prometheus=true
grafana=true

# =============================================================================
# EXEMPLE D'UTILISATION
# =============================================================================
#
# Tester la connexion:
#   ansible all -i inventory.ini -m ping
#
# Lister les hosts:
#   ansible all -i inventory.ini --list-hosts
#
# Exécuter un playbook:
#   ansible-playbook -i inventory.ini playbook_hardening.yml
#
# Exécuter sur un groupe spécifique:
#   ansible-playbook -i inventory.ini playbook_hardening.yml --limit web_servers
#
# Exécuter en mode dry-run:
#   ansible-playbook -i inventory.ini playbook_hardening.yml --check
#
# Exécuter avec verbosité:
#   ansible-playbook -i inventory.ini playbook_hardening.yml -vvv
#
# =============================================================================
