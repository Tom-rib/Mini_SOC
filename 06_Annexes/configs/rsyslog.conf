# =============================================================================
# CONFIGURATION RSYSLOG - FORWARD LOGS VERS WAZUH/SIEM
# =============================================================================
# Chemin: /etc/rsyslog.conf ou /etc/rsyslog.d/wazuh-forward.conf
# Usage: Centralisation des logs vers serveur SOC
# Redémarrer: sudo systemctl restart rsyslog
# =============================================================================

# -----------------------------------------------------------------------------
# SECTION 1: MODULES NÉCESSAIRES
# -----------------------------------------------------------------------------

# Module pour la sortie réseau (TCP)
module(load="omfwd")

# Module pour le format JSON (optionnel mais recommandé)
module(load="mmjsonparse")

# Module pour les fichiers locaux
module(load="imfile")

# -----------------------------------------------------------------------------
# SECTION 2: TEMPLATES DE FORMATAGE
# -----------------------------------------------------------------------------

# Template pour format JSON enrichi (recommandé pour SIEM)
template(name="WazuhJsonTemplate" type="list") {
    constant(value="{")
    constant(value="\"timestamp\":\"")      property(name="timereported" dateFormat="rfc3339")
    constant(value="\",\"hostname\":\"")    property(name="hostname")
    constant(value="\",\"severity\":\"")    property(name="syslogseverity-text")
    constant(value="\",\"facility\":\"")    property(name="syslogfacility-text")
    constant(value="\",\"program\":\"")     property(name="programname")
    constant(value="\",\"message\":\"")     property(name="msg" format="json")
    constant(value="\"}")
    constant(value="\n")
}

# Template format syslog standard (alternatif)
template(name="WazuhSyslogTemplate" type="string"
    string="<%pri%>%timestamp:::date-rfc3339% %hostname% %syslogtag%%msg:::sp-if-no-1st-sp%%msg%\n"
)

# Template simple pour debug
template(name="DebugTemplate" type="string"
    string="%timestamp% %hostname% %syslogtag%%msg%\n"
)

# -----------------------------------------------------------------------------
# SECTION 3: RÈGLES DE FORWARDING - LOGS SYSTÈME
# -----------------------------------------------------------------------------

# ⚠️ IMPORTANT: Remplacer 192.168.100.20 par l'IP de votre serveur SOC/Wazuh
$ActionQueueType LinkedList          # File d'attente en cas de panne réseau
$ActionQueueFileName wazuhqueue      # Nom du fichier de queue
$ActionResumeRetryCount -1           # Réessayer indéfiniment
$ActionQueueSaveOnShutdown on        # Sauvegarder la queue à l'arrêt

# === LOGS SSH (CRITIQUE pour détection brute force) ===
# Tous les logs d'authentification SSH
if $programname == 'sshd' then {
    action(type="omfwd" 
           Target="192.168.100.20"    # ⚠️ IP du serveur Wazuh
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
    # Garder aussi une copie locale
    action(type="omfile" file="/var/log/ssh-forwarded.log")
}

# === LOGS SUDO (détection élévation de privilèges) ===
if $programname == 'sudo' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
    action(type="omfile" file="/var/log/sudo-forwarded.log")
}

# === LOGS AUDITD (audit système) ===
if $programname == 'auditd' or $programname == 'audit' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# === LOGS KERNEL (anomalies système) ===
if $syslogfacility-text == 'kern' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# === LOGS CRON (détection backdoors temporels) ===
if $programname startswith 'CRON' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# === LOGS FIREWALL (connexions bloquées) ===
if $msg contains 'DROPPED' or $msg contains 'REJECT' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# -----------------------------------------------------------------------------
# SECTION 4: RÈGLES DE FORWARDING - LOGS APPLICATIFS
# -----------------------------------------------------------------------------

# === LOGS NGINX/APACHE (serveur web) ===
# Note: Nécessite la configuration du module imfile ci-dessous

input(type="imfile"
      File="/var/log/nginx/access.log"
      Tag="nginx-access"
      Severity="info"
      Facility="local6")

input(type="imfile"
      File="/var/log/nginx/error.log"
      Tag="nginx-error"
      Severity="error"
      Facility="local6")

# Forward des logs web
if $syslogtag == 'nginx-access' or $syslogtag == 'nginx-error' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# === LOGS PHP-FPM (si applicable) ===
input(type="imfile"
      File="/var/log/php-fpm/error.log"
      Tag="php-fpm"
      Severity="error"
      Facility="local7")

if $syslogtag == 'php-fpm' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# === LOGS FAIL2BAN (bans automatiques) ===
input(type="imfile"
      File="/var/log/fail2ban.log"
      Tag="fail2ban"
      Severity="warning"
      Facility="local5")

if $syslogtag == 'fail2ban' then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# -----------------------------------------------------------------------------
# SECTION 5: RÈGLES PAR GRAVITÉ
# -----------------------------------------------------------------------------

# Forward TOUTES les erreurs critiques
if $syslogseverity <= 3 then {
    action(type="omfwd" 
           Target="192.168.100.20" 
           Port="514" 
           Protocol="tcp"
           template="WazuhJsonTemplate")
}

# -----------------------------------------------------------------------------
# SECTION 6: RÈGLE CATCH-ALL (optionnel)
# -----------------------------------------------------------------------------

# Forward TOUS les logs système vers le SIEM
# ⚠️ ATTENTION: Peut générer beaucoup de trafic
# Décommenter uniquement si nécessaire

# *.* action(type="omfwd" 
#           Target="192.168.100.20" 
#           Port="514" 
#           Protocol="tcp"
#           template="WazuhJsonTemplate")

# -----------------------------------------------------------------------------
# SECTION 7: LOGS LOCAUX (conservation locale)
# -----------------------------------------------------------------------------

# Garder des copies locales des logs importants
# (utile si le réseau est coupé)

auth,authpriv.*                 /var/log/auth.log
*.*;auth,authpriv.none          -/var/log/syslog
kern.*                          -/var/log/kern.log
mail.*                          -/var/log/mail.log
*.emerg                         :omusrmsg:*

# -----------------------------------------------------------------------------
# SECTION 8: PERFORMANCES ET OPTIMISATION
# -----------------------------------------------------------------------------

# Taille de la queue de messages
$MainMsgQueueSize 50000

# Batch les messages pour améliorer les perfs
$ActionQueueDequeueBatchSize 100

# Timeout réseau
$ActionSendStreamDriverPermittedPeer 192.168.100.20
$ActionSendStreamDriverMode 1
$ActionSendStreamDriverAuthMode anon

# =============================================================================
# VÉRIFICATION ET TESTS
# =============================================================================
#
# 1. Tester la syntaxe:
#    sudo rsyslogd -N1
#
# 2. Redémarrer rsyslog:
#    sudo systemctl restart rsyslog
#
# 3. Vérifier le status:
#    sudo systemctl status rsyslog
#
# 4. Test manuel:
#    logger -p auth.info "TEST: Message de test vers Wazuh"
#
# 5. Vérifier la réception côté Wazuh:
#    tail -f /var/ossec/logs/archives/archives.log
#
# 6. Debug si problème:
#    sudo rsyslogd -dn
#
# 7. Vérifier les stats:
#    sudo rsyslogd -i /var/run/rsyslogd.pid -v
#
# =============================================================================
# SÉCURITÉ: TRANSPORT TLS (recommandé pour production)
# =============================================================================
#
# Pour chiffrer les logs en transit (optionnel mais recommandé):
#
# $DefaultNetstreamDriver gtls
# $ActionSendStreamDriverMode 1
# $ActionSendStreamDriverAuthMode x509/name
# $ActionSendStreamDriverPermittedPeer wazuh.example.com
#
# =============================================================================
