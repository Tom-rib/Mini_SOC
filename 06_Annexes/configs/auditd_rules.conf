# =============================================================================
# RÈGLES AUDITD - AUDIT SYSTÈME POUR MINI SOC
# =============================================================================
# Chemin: /etc/audit/rules.d/audit.rules
# Usage: Traçabilité et détection d'activités suspectes
# Application: sudo augenrules --load
# Vérification: sudo auditctl -l
# =============================================================================

# -----------------------------------------------------------------------------
# SECTION 1: CONFIGURATION GÉNÉRALE
# -----------------------------------------------------------------------------

# Supprimer toutes les règles existantes (clean start)
-D

# Taille du buffer (augmenter si système très actif)
-b 8192

# Action si buffer plein: 0=silent, 1=printk, 2=panic
-f 1

# Ne jamais modifier cette config à chaud (protection)
-e 2

# -----------------------------------------------------------------------------
# SECTION 2: SURVEILLANCE DES FICHIERS SYSTÈME CRITIQUES
# -----------------------------------------------------------------------------

# === FICHIERS DE CONFIGURATION SYSTÈME ===
# Surveiller /etc/passwd (création/modification comptes)
-w /etc/passwd -p wa -k identity_changes

# Surveiller /etc/group (modification groupes)
-w /etc/group -p wa -k identity_changes

# Surveiller /etc/shadow (mots de passe)
-w /etc/shadow -p wa -k identity_changes

# Surveiller /etc/gshadow
-w /etc/gshadow -p wa -k identity_changes

# Surveiller /etc/sudoers (privilèges sudo)
-w /etc/sudoers -p wa -k privilege_escalation
-w /etc/sudoers.d/ -p wa -k privilege_escalation

# === CONFIGURATION SSH ===
-w /etc/ssh/sshd_config -p wa -k sshd_config_changes
-w /etc/ssh/ssh_config -p wa -k ssh_config_changes

# === CONFIGURATION RÉSEAU ===
-w /etc/hosts -p wa -k network_config
-w /etc/network/ -p wa -k network_config
-w /etc/sysconfig/network-scripts/ -p wa -k network_config

# === CONFIGURATION FIREWALL ===
-w /etc/firewalld/ -p wa -k firewall_config
-w /etc/sysconfig/iptables -p wa -k firewall_config

# === SERVICES ET DAEMONS ===
-w /etc/systemd/ -p wa -k systemd_config
-w /usr/lib/systemd/ -p wa -k systemd_config

# === LOGS SYSTÈME (détection effacement logs) ===
-w /var/log/wtmp -p wa -k session_tracking
-w /var/log/btmp -p wa -k session_tracking
-w /var/log/lastlog -p wa -k session_tracking
-w /var/log/secure -p wa -k auth_log_modification
-w /var/log/audit/ -p wa -k audit_log_modification

# === CRONTABS (backdoors temporels) ===
-w /etc/cron.allow -p wa -k cron_config
-w /etc/cron.deny -p wa -k cron_config
-w /etc/cron.d/ -p wa -k cron_config
-w /etc/cron.daily/ -p wa -k cron_config
-w /etc/cron.hourly/ -p wa -k cron_config
-w /etc/cron.monthly/ -p wa -k cron_config
-w /etc/cron.weekly/ -p wa -k cron_config
-w /etc/crontab -p wa -k cron_config
-w /var/spool/cron/ -p wa -k cron_config

# -----------------------------------------------------------------------------
# SECTION 3: SURVEILLANCE DES BINAIRES SYSTÈME
# -----------------------------------------------------------------------------

# === COMMANDES D'ADMINISTRATION ===
-w /usr/bin/sudo -p x -k privilege_command
-w /usr/bin/su -p x -k privilege_command

# === COMMANDES RÉSEAU ===
-w /usr/bin/wget -p x -k suspicious_download
-w /usr/bin/curl -p x -k suspicious_download
-w /usr/bin/nc -p x -k suspicious_network
-w /usr/bin/ncat -p x -k suspicious_network
-w /usr/bin/netcat -p x -k suspicious_network
-w /usr/bin/nmap -p x -k suspicious_network
-w /usr/bin/ss -p x -k network_recon
-w /usr/bin/netstat -p x -k network_recon

# === GESTION DES COMPTES ===
-w /usr/sbin/useradd -p x -k user_modification
-w /usr/sbin/usermod -p x -k user_modification
-w /usr/sbin/userdel -p x -k user_modification
-w /usr/sbin/groupadd -p x -k group_modification
-w /usr/sbin/groupmod -p x -k group_modification
-w /usr/sbin/groupdel -p x -k group_modification

# === MODIFICATION MOT DE PASSE ===
-w /usr/bin/passwd -p x -k password_change
-w /usr/bin/chpasswd -p x -k password_change

# === MONTAGE SYSTÈME DE FICHIERS ===
-w /usr/bin/mount -p x -k filesystem_mount
-w /usr/bin/umount -p x -k filesystem_mount

# === GESTION DES MODULES KERNEL ===
-w /usr/sbin/insmod -p x -k kernel_module
-w /usr/sbin/rmmod -p x -k kernel_module
-w /usr/sbin/modprobe -p x -k kernel_module

# === OUTILS D'ÉCOUTE RÉSEAU ===
-w /usr/bin/tcpdump -p x -k packet_capture
-w /usr/bin/tshark -p x -k packet_capture
-w /usr/bin/wireshark -p x -k packet_capture

# -----------------------------------------------------------------------------
# SECTION 4: SYSCALLS (appels système suspects)
# -----------------------------------------------------------------------------

# === CHANGEMENT DE PERMISSIONS (chmod/chown) ===
-a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod
-a always,exit -F arch=b32 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod
-a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=4294967295 -k perm_mod
-a always,exit -F arch=b32 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=4294967295 -k perm_mod

# === MODIFICATION EXTENDED ATTRIBUTES ===
-a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod
-a always,exit -F arch=b32 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod

# === CRÉATION/SUPPRESSION DE FICHIERS ===
-a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k file_access_denied
-a always,exit -F arch=b32 -S creat,open,openat,open_by_handle_at -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k file_access_denied
-a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k file_access_denied
-a always,exit -F arch=b32 -S creat,open,openat,open_by_handle_at -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k file_access_denied

# === SUPPRESSION DE FICHIERS (unlink/rmdir) ===
-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=4294967295 -k file_deletion
-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=4294967295 -k file_deletion

# === MONTAGE SYSTÈMES DE FICHIERS ===
-a always,exit -F arch=b64 -S mount,umount2 -F auid>=1000 -F auid!=4294967295 -k filesystem_mount
-a always,exit -F arch=b32 -S mount,umount2 -F auid>=1000 -F auid!=4294967295 -k filesystem_mount

# === CHARGEMENT MODULES KERNEL ===
-a always,exit -F arch=b64 -S init_module,finit_module,delete_module -F auid>=1000 -F auid!=4294967295 -k kernel_module_load
-a always,exit -F arch=b32 -S init_module,finit_module,delete_module -F auid>=1000 -F auid!=4294967295 -k kernel_module_load

# === CONNEXIONS RÉSEAU (connect/accept) ===
# ⚠️ Génère BEAUCOUP de logs - activer uniquement si nécessaire
# -a always,exit -F arch=b64 -S connect,accept,accept4 -F auid>=1000 -F auid!=4294967295 -k network_connections
# -a always,exit -F arch=b32 -S connect,accept,accept4 -F auid>=1000 -F auid!=4294967295 -k network_connections

# === MODIFICATION HEURE SYSTÈME ===
-a always,exit -F arch=b64 -S adjtimex,settimeofday,clock_settime -k time_change
-a always,exit -F arch=b32 -S adjtimex,settimeofday,clock_settime -k time_change
-w /etc/localtime -p wa -k time_change

# === CHANGEMENT HOSTNAME/DOMAINNAME ===
-a always,exit -F arch=b64 -S sethostname,setdomainname -k system_locale
-a always,exit -F arch=b32 -S sethostname,setdomainname -k system_locale
-w /etc/hostname -p wa -k system_locale

# -----------------------------------------------------------------------------
# SECTION 5: SURVEILLANCE DES PROCESSUS PRIVILÉGIÉS
# -----------------------------------------------------------------------------

# Tous les appels à execve() depuis UID 0 (root)
-a always,exit -F arch=b64 -S execve -F uid=0 -k root_command
-a always,exit -F arch=b32 -S execve -F uid=0 -k root_command

# Tous les appels avec setuid/setgid (élévation privilèges)
-a always,exit -F arch=b64 -S setuid,setgid,setreuid,setregid,setresuid,setresgid -F auid>=1000 -F auid!=4294967295 -k privilege_escalation
-a always,exit -F arch=b32 -S setuid,setgid,setreuid,setregid,setresuid,setresgid -F auid>=1000 -F auid!=4294967295 -k privilege_escalation

# -----------------------------------------------------------------------------
# SECTION 6: SURVEILLANCE DIRECTORIES WEB (si serveur web)
# -----------------------------------------------------------------------------

# ⚠️ À ADAPTER: Remplacer par vos chemins web réels
-w /var/www/html/ -p wa -k web_content_modification
-w /usr/share/nginx/html/ -p wa -k web_content_modification

# Uploads (détection upload malveillant)
-w /var/www/html/uploads/ -p wa -k suspicious_upload
-w /tmp/ -p wa -k tmp_suspicious

# -----------------------------------------------------------------------------
# SECTION 7: SURVEILLANCE SSH
# -----------------------------------------------------------------------------

# Clés SSH ajoutées
-w /root/.ssh/ -p wa -k root_ssh_keys
-w /home/*/.ssh/ -p wa -k user_ssh_keys

# Agent SSH
-w /usr/bin/ssh-agent -p x -k ssh_agent
-w /usr/bin/ssh-add -p x -k ssh_keys

# -----------------------------------------------------------------------------
# SECTION 8: RENDRE LA CONFIG IMMUTABLE
# -----------------------------------------------------------------------------

# Empêcher toute modification de ces règles à chaud
# (nécessite un reboot pour changer)
-e 2

# =============================================================================
# DÉPLOIEMENT ET VÉRIFICATION
# =============================================================================
#
# 1. Copier ce fichier:
#    sudo cp auditd_rules.conf /etc/audit/rules.d/audit.rules
#
# 2. Générer et charger les règles:
#    sudo augenrules --load
#
# 3. Vérifier les règles actives:
#    sudo auditctl -l
#
# 4. Redémarrer auditd:
#    sudo systemctl restart auditd
#
# 5. Vérifier le status:
#    sudo systemctl status auditd
#
# 6. Tester une règle:
#    sudo touch /etc/passwd
#    sudo ausearch -k identity_changes
#
# 7. Recherche dans les logs:
#    sudo ausearch -k [nom_de_cle]
#    sudo ausearch -ts recent
#    sudo ausearch -ui 1000
#
# 8. Générer un rapport:
#    sudo aureport
#    sudo aureport -x --summary
#    sudo aureport --failed
#
# =============================================================================
# INTERPRÉTATION DES CLÉS (keys)
# =============================================================================
#
# identity_changes       = Modification comptes/groupes
# privilege_escalation   = Tentative élévation privilèges
# sshd_config_changes    = Modif config SSH
# network_config         = Changement config réseau
# firewall_config        = Modif règles firewall
# systemd_config         = Changement services
# session_tracking       = Connexions/déconnexions
# auth_log_modification  = Tentative effacement logs
# cron_config            = Backdoors temporels
# privilege_command      = Utilisation sudo/su
# suspicious_download    = Download fichiers (wget/curl)
# suspicious_network     = Outils réseau suspects
# user_modification      = Création/suppression users
# password_change        = Changement mots de passe
# kernel_module          = Chargement modules kernel
# file_access_denied     = Accès refusés
# file_deletion          = Suppressions de fichiers
# root_command           = Commandes exécutées en root
# web_content_modification = Modif contenu web
# suspicious_upload      = Upload dans /tmp ou web
# root_ssh_keys          = Modif clés SSH root
#
# =============================================================================
# PERFORMANCE
# =============================================================================
#
# Ces règles peuvent générer beaucoup de logs.
# Sur un système très actif, surveiller:
# - La taille de /var/log/audit/
# - L'utilisation CPU de auditd
# - Le remplissage du buffer (-b 8192)
#
# Ajuster en fonction de vos besoins réels.
#
# =============================================================================
